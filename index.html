<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aether Player</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<style>
*, *::before, *::after { 
  box-sizing: border-box; 
  margin: 0; 
  padding: 0; 
  -webkit-tap-highlight-color: transparent; 
}

:root {
  --c1: 200, 169, 110;
  --accent:      rgb(var(--c1));
  --accent-dim:  rgba(var(--c1), 0.55);
  --accent-glow: rgba(var(--c1), 0.18);
  --accent-hair: rgba(var(--c1), 0.08);
  --bg:       #080807;
  --surf0:    rgba(255,255,255,0.030);
  --surf1:    rgba(255,255,255,0.055);
  --surf2:    rgba(255,255,255,0.085);
  --border:   rgba(255,255,255,0.065);
  --text:     #ece7de;
  --muted:    rgba(236,231,222,0.38);
  --muted2:   rgba(236,231,222,0.18);
  --sans: 'SF Pro Display', 'Helvetica Neue', system-ui, sans-serif;
  --sidebar-w: 224px;
  --spring-main:   cubic-bezier(0.22, 1, 0.36, 1);
  --spring-soft:   cubic-bezier(0.25, 1, 0.5, 1);
  --spring-bounce: cubic-bezier(0.34, 1.4, 0.64, 1);
  --t-fast: 220ms;
  --t-med: 380ms;
  --t-slow: 520ms;
  --radius-art: 10px;
  --radius-sm:  10px;
  --radius-xs:  6px;
  --np-art-margin: 30px;
}

html, body {
  height: 100%; overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
  font-size: 14px;
}

/* ════ DYNAMIC BACKGROUND ══════ */
#bg {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none; overflow: hidden;
  background: #080807;
}
#bg-layer-a, #bg-layer-b {
  position: absolute; inset: -30%;
  width: 160%; height: 160%;
  will-change: transform, opacity;
  transition: opacity 1.8s cubic-bezier(0.45, 0, 0.55, 1);
}
#bg-layer-b { opacity: 0; }
.bg-drifting { animation: bgDrift 36s ease-in-out infinite alternate; }
@keyframes bgDrift {
  0%   { transform: translate3d(0%,0%,0) scale(1.000) rotate(0deg); }
  33%  { transform: translate3d(2.5%,-1.8%,0) scale(1.025) rotate(0.4deg); }
  66%  { transform: translate3d(-2.0%,3.0%,0) scale(0.978) rotate(-0.3deg); }
  100% { transform: translate3d(1.5%,-1.2%,0) scale(1.010) rotate(-0.08deg); }
}
#bg-breathe {
  position: absolute; inset: 0;
  animation: bgBreathe 22s ease-in-out infinite alternate;
  will-change: transform;
}
@keyframes bgBreathe {
  0%   { transform: scale(1.000); }
  50%  { transform: scale(1.030); }
  100% { transform: scale(1.000); }
}
#bg::after {
  content:''; position: absolute; inset: 0; z-index: 3;
  background:
    radial-gradient(ellipse 100% 100% at 50% 50%, transparent 35%, rgba(5,4,3,0.42) 100%),
    linear-gradient(to bottom, rgba(5,4,3,0.12) 0%, transparent 25%, transparent 75%, rgba(5,4,3,0.25) 100%);
  pointer-events: none;
}
#bg::before {
  content:''; position: absolute; inset: 0; z-index: 4;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.025; mix-blend-mode: overlay; pointer-events: none;
}

/* ═════ APP SHELL ════════ */
#app {
  position: relative; z-index: 1;
  display: flex; height: 100vh; overflow: hidden;
}

/* ══════ SIDEBAR ═════════ */
#sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  display: flex; flex-direction: column;
  padding: 28px 16px;
  border-right: 1px solid var(--border);
  gap: 4px; overflow-y: auto;
}
#sidebar::-webkit-scrollbar { display: none; }
.logo {
  font-size: 18px; font-weight: 700; letter-spacing: -0.01em;
  color: var(--accent); margin-bottom: 26px; padding: 4px 10px;
  display: flex; flex-direction: column; gap: 2px;
}
.logo-sub { font-size: 10px; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
.nav-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 400; color: var(--muted); cursor: pointer;
  border: none; background: none; text-align: left; width: 100%;
  font-family: var(--sans);
  transition: color var(--t-fast), background var(--t-fast);
  white-space: nowrap; overflow: hidden;
}
.nav-btn:hover { color: var(--text); background: var(--surf0); }
.nav-btn.active { color: var(--accent); background: var(--accent-hair); font-weight: 500; }
.nav-btn svg { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.75; }
.nav-btn.active svg { opacity: 1; }
.sidebar-label { font-size: 9.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted2); padding: 18px 12px 6px; }

/* ═══════════════════ LIBRARY ═══════════════════ */
#library-toggle-btn {
  position: absolute;
  top: 50%;
  left: 0;
  transform: translateY(-50%);
  width: 28px;
  background: var(--surf1);
  border: 1px solid var(--border);
  border-left: none;
  border-radius: 0 var(--radius-xs) var(--radius-xs) 0;
  color: var(--muted);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 14px 0;
  z-index: 10;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--t-fast), color var(--t-fast), background var(--t-fast);
}
#library-toggle-btn:hover { color: var(--text); background: var(--surf2); }
#library-toggle-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
#library-toggle-btn .lib-btn-label {
  font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
  writing-mode: vertical-rl; text-orientation: mixed;
  color: inherit; font-family: var(--sans);
}

#library {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden; border-right: 1px solid var(--border); min-width: 0;
  transition: width var(--t-med) var(--spring-main),
              flex var(--t-med) var(--spring-main),
              opacity var(--t-fast) ease,
              border-color var(--t-fast) ease;
  will-change: width, opacity;
  position: relative;
}
#library.collapsed {
  flex: 0 0 0px;
  width: 0 !important;
  overflow: hidden;
  opacity: 0;
  border-right-color: transparent;
  pointer-events: none;
}
#app.library-collapsed #library-toggle-btn {
  opacity: 1;
  pointer-events: all;
}
#library-collapse-btn {
  background: none; border: none; cursor: pointer;
  color: var(--muted); display: flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; border-radius: var(--radius-xs);
  flex-shrink: 0;
  transition: color var(--t-fast), background var(--t-fast);
}
#library-collapse-btn:hover { color: var(--text); background: var(--surf0); }
#library-collapse-btn svg { width: 15px; height: 15px; }
.library-header {
  padding: 20px 20px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; gap: 12px;
}
.library-title { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); }
.track-count { font-size: 9px; letter-spacing: 0.04em; color: var(--muted); margin-top: 2px; }
#drop-zone {
  margin: 0;
  border: 1px dashed rgba(var(--c1), 0.22);
  border-radius: var(--radius-sm);
  padding: 16px 20px;
  text-align: center; cursor: pointer;
  background: rgba(var(--c1), 0.02);
  flex-shrink: 0;
  transition: all 200ms ease;
}
@media (min-width: 681px) {
  #drop-zone { margin: 20px 24px 12px; padding: 22px 20px; }
}
#drop-zone:hover, #drop-zone.drag-over {
  border-color: var(--accent); background: var(--accent-hair); transform: scale(1.003);
}
#drop-zone.drag-over { box-shadow: 0 0 30px var(--accent-glow); }
.drop-icon { font-size: 22px; margin-bottom: 6px; opacity: 0.45; }
.drop-text { font-size: 12px; color: var(--muted); line-height: 1.6; }
.drop-text strong { color: var(--accent); font-weight: 500; }
#file-input { display: none; }
#track-list { flex: 1; overflow-y: auto; padding: 4px 16px 20px; }
#track-list::-webkit-scrollbar { width: 2px; }
#track-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
.track-item {
  display: grid; grid-template-columns: 44px 1fr auto;
  align-items: center; gap: 12px;
  padding: 8px 10px; border-radius: var(--radius-xs);
  cursor: pointer; border: 1px solid transparent; margin-bottom: 1px;
  transition: background var(--t-fast), border-color var(--t-fast);
  animation: itemIn 0.28s var(--spring-soft) both;
}
@keyframes itemIn { from { opacity:0; transform:translateY(8px); } }
.track-item:hover { background: var(--surf0); }
.track-item.playing { background: var(--accent-hair); border-color: rgba(var(--c1),0.12); }
.track-thumb {
  width: 44px; height: 44px; border-radius: 7px;
  background: var(--surf1);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0; overflow: hidden;
}
.track-thumb img { width: 100%; height: 100%; object-fit: cover; }
.track-thumb-placeholder { opacity: 0.25; }
.track-info { min-width: 0; }
.track-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-item.playing .track-name { color: var(--accent); }
.track-artist { font-size: 11.5px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.track-meta { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.track-dur { font-size: 11px; color: var(--muted2); font-variant-numeric: tabular-nums; }
.bars { display: flex; align-items: flex-end; gap: 2px; height: 9px; width: 14px; }
.bars span { width: 2.5px; height: 9px; border-radius: 2px; background: var(--accent); animation: barsAnim 0.7s ease infinite alternate; }
.bars span:nth-child(1) { animation-delay: 0s; }
.bars span:nth-child(2) { animation-delay: 0.15s; }
.bars span:nth-child(3) { animation-delay: 0.08s; }
@keyframes barsAnim { from { height: 20%; } to { height: 100%; } }
.empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 40px; color: var(--muted); }
.empty-state .big-icon { font-size: 40px; opacity: 0.12; }
.empty-state p { font-size: 12.5px; text-align: center; line-height: 1.7; max-width: 200px; }

/* ═══════════════════ NOW PLAYING ═══════════════════ */
#now-playing {
  width: 480px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

/* ── Stage: top-aligned with 80px breathing room ── */
.np-stage {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: 80px; 
  min-height: 0;
  overflow: hidden;
  transition: opacity var(--t-med) var(--spring-soft),
              transform var(--t-med) var(--spring-soft);
  will-change: transform, opacity;
}
#now-playing.lyrics-open .np-stage {
  opacity: 0.35;
  pointer-events: none;
  transform: scale(0.96);
}

/* ── Artwork: exactly 30px margins on side ── */
.art-wrap {
  width: calc(100% - calc(var(--np-art-margin) * 2)); 
  max-width: none;
  aspect-ratio: 1 / 1;
  border-radius: var(--radius-art);
  overflow: hidden;
  margin: 0 var(--np-art-margin);
  background: var(--surf1);
  position: relative;
  box-shadow: 0 32px 80px rgba(0,0,0,0.70), 0 0 0 1px var(--border);
  flex-shrink: 0;
  align-self: center;
  transition: box-shadow var(--t-slow) var(--spring-soft), transform var(--t-fast) ease;
}
.art-wrap:hover { transform: scale(1.006); }
.art-wrap.glowing {
  box-shadow: 0 32px 80px rgba(0,0,0,0.60),
              0 0 0 1px var(--border),
              0 0 90px rgba(var(--c1), 0.25);
}
#np-cover { width: 100%; height: 100%; object-fit: cover; display: none; transition: opacity 0.5s ease; }
#np-cover.visible { display: block; }
.art-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 64px; opacity: 0.1; }

/* ── Track info: matches artwork alignment perfectly ── */
.np-info {
  width: calc(100% - calc(var(--np-art-margin) * 2));
  max-width: none;
  margin-top: 18px;
  text-align: left;
  padding: 0;
  overflow: hidden;
  align-self: center;
  flex-shrink: 0;
}
.np-title-wrap {
  overflow: hidden;
  position: relative;
}
#np-title {
  font-size: 20px; font-weight: 700; letter-spacing: -0.022em;
  line-height: 1.2; color: var(--text);
  white-space: nowrap;
  display: inline-block;
}
#np-title.marquee, #np-artist.marquee {
  animation: marqueeScroll 6s linear infinite alternate; 
}
@keyframes marqueeScroll {
  0%, 20% { transform: translateX(0); }
  80%, 100% { transform: translateX(var(--marquee-offset, -60px)); }
}

.np-artist-wrap {
  overflow: hidden;
  position: relative;
  margin-top: 4px;
}
#np-artist {
  font-size: 13px; color: var(--accent);
  white-space: nowrap;
  cursor: pointer; display: inline-block;
  transition: opacity var(--t-fast);
  font-weight: 500;
}
#np-artist:hover { opacity: 0.75; }

/* ── Controls: Volume removed ── */
.np-controls {
  padding: 0 var(--np-art-margin) 26px;
  flex-shrink: 0;
}
.progress-wrap { width: 100%; margin: 16px 0 5px; }
#progress-bar {
  width: 100%; height: 9px; background: var(--surf2);
  border-radius: 99px; cursor: pointer;
  -webkit-appearance: none; appearance: none; outline: none; border: none;
}
#progress-bar::-webkit-slider-thumb {
  -webkit-appearance: none; width: 13px; height: 9px;
  border-radius: 50%; background: var(--accent);
  box-shadow: 0 0 10px rgba(var(--c1),0.55); cursor: pointer;
  margin-top: 0px; opacity: 0; transition: opacity 0.2s;
}
.progress-wrap:hover #progress-bar::-webkit-slider-thumb { opacity: 1; }
#progress-bar::-webkit-slider-runnable-track {
  height: 9px; border-radius: 99px;
  background: linear-gradient(to right, var(--accent) var(--prog,0%), var(--surf2) var(--prog,0%));
}
.time-row {
  display: flex; justify-content: space-between;
  font-size: 10.5px; color: var(--muted2); margin-top: 6px;
  font-variant-numeric: tabular-nums; letter-spacing: 0.03em;
}

.ctrl-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 14px; padding: 0 4px;
}
.ctrl-btn {
  background: none; border: none; cursor: pointer;
  color: var(--muted); display: flex; align-items: center; justify-content: center;
  width: 38px; height: 38px; border-radius: 50%;
  transition: color var(--t-fast), transform 180ms var(--spring-bounce);
  flex-shrink: 0; font-size: 18px;
}
.ctrl-btn:hover { color: var(--text); }
.ctrl-btn:active { transform: scale(0.88); }
.ctrl-btn.active-btn { color: var(--accent); }
.play-btn {
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--accent); color: #080807 !important;
  box-shadow: 0 0 28px rgba(var(--c1),0.45);
  font-size: 20px;
  transition: transform 180ms var(--spring-bounce), box-shadow var(--t-fast);
}
.play-btn:hover {
  transform: scale(1.08);
  box-shadow: 0 0 44px rgba(var(--c1),0.65);
  color: #080807 !important; background: var(--accent);
}
.play-btn:active {
  transform: scale(0.94); background: var(--accent) !important;
  color: #080807 !important; box-shadow: 0 0 18px rgba(var(--c1),0.35);
}

.secondary-row {
  display: flex; align-items: center; justify-content: flex-end;
  margin-top: 10px;
}
.action-icons { display: flex; align-items: center; gap: 4px; }
.icon-btn {
  background: none; border: none; cursor: pointer;
  color: var(--muted); display: flex; align-items: center; justify-content: center;
  width: 34px; height: 34px; border-radius: 8px; font-size: 16px;
  transition: color var(--t-fast), transform 180ms var(--spring-bounce);
}
.icon-btn:hover { color: var(--text); }
.icon-btn:active { transform: scale(0.88); }
.icon-btn.active-btn { color: var(--accent); }

/* ═══════════════════ UNIFIED LYRICS OVERLAY ═══════════════════ */
#lyrics-overlay {
  position: absolute; inset: 0; z-index: 20;
  display: flex; flex-direction: column;
  background: rgba(8,8,7,0.62);
  backdrop-filter: blur(30px) saturate(1.4);
  -webkit-backdrop-filter: blur(30px) saturate(1.4);
  opacity: 0; pointer-events: none;
  transform: translate3d(100%, 0, 0);
  transition: opacity var(--t-med) var(--spring-soft), transform var(--t-med) var(--spring-main);
  will-change: transform, opacity;
}
#now-playing.lyrics-open #lyrics-overlay {
  opacity: 1; pointer-events: all; transform: translate3d(0, 0, 0);
}
.lyrics-header {
  padding: 16px 18px 12px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
}
.lyrics-header-left { display: flex; align-items: center; gap: 10px; }
.lyrics-title { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); font-weight: 600; }
.lyrics-track-pill {
  display: flex; align-items: center; gap: 7px; background: var(--surf0); border: 1px solid var(--border);
  border-radius: 4px; padding: 4px 10px 4px 5px; max-width: 170px; overflow: hidden;
}
.lyrics-track-pill-art { width: 20px; height: 20px; border-radius: 2px; background: var(--surf2); flex-shrink: 0; overflow: hidden; }
.lyrics-track-pill-art img { width: 100%; height: 100%; object-fit: cover; }
.lyrics-track-pill-text { min-width: 0; }
.lyrics-track-pill-name { font-size: 10px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
.lyrics-track-pill-artist { font-size: 9px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.lyrics-header-actions { display: flex; align-items: center; gap: 6px; }
.lhdr-btn {
  width: 30px; height: 30px; border-radius: 20px; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 13px;
  background: rgba(255,255,255,0.10); backdrop-filter: blur(12px) saturate(1.6); -webkit-backdrop-filter: blur(12px) saturate(1.6);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.22), inset 0 -1px 0 rgba(0,0,0,0.12), 0 1px 6px rgba(0,0,0,0.18);
  color: rgba(236,231,222,0.72); transition: color 150ms ease, background 150ms ease, transform 180ms var(--spring-bounce);
  will-change: transform; flex-shrink: 0;
}
.lhdr-btn:hover { color: var(--text); background: rgba(255,255,255,0.16); transform: scale(1.08); }
.lhdr-btn:active { transform: scale(0.92); }

#lyrics-scroll-wrap { flex: 1; position: relative; overflow: hidden; touch-action: none; }
#lyrics-scroll-wrap::before {
  content: ''; position: absolute; left: 0; right: 0; top: 0; z-index: 5; pointer-events: none;
  height: 80px; background: linear-gradient(to bottom, rgba(8,8,7,0.85) 0%, rgba(8,8,7,0.55) 40%, rgba(8,8,7,0.15) 75%, transparent 100%);
}
#lyrics-scroll-wrap::after {
  content: ''; position: absolute; left: 0; right: 0; bottom: 0; z-index: 5; pointer-events: none;
  height: 90px; background: linear-gradient(to top, rgba(8,8,7,0.90) 0%, rgba(8,8,7,0.55) 50%, transparent 100%);
}
#lyrics-inner {
  position: absolute; top: 0; left: 0; right: 0;
  padding: 10vh 22px 60vh 15px; will-change: transform; transform: translate3d(0,0,0);
}

/* ═══════════════════ LYRIC STYLING ═══════════════════ */
.lyric-line { display: block; padding: 14px 0 14px 6px; cursor: pointer; border-radius: 8px; user-select: none; }
.ll-text {
  display: block; font-size: 32px; font-weight: 700; line-height: 1.35; letter-spacing: -0.02em;
  word-wrap: break-word; overflow-wrap: break-word; white-space: normal; transform-origin: left center;
  color: rgba(255, 255, 255, 0.35); transform: translate3d(0,0,0) scale3d(0.85, 0.85, 1);
  will-change: transform, color, text-shadow; transition: transform 700ms cubic-bezier(0.2, 0.9, 0.3, 1), color 700ms cubic-bezier(0.2, 0.9, 0.3, 1), text-shadow 700ms ease;
}
.lyric-line.active .ll-text { color: rgba(255, 255, 255, 1); transform: translate3d(0,0,0) scale3d(0.97, 0.97, 1); text-shadow: 0 4px 16px rgba(0,0,0,0.4); }
.lyric-line.past .ll-text { color: rgba(255, 255, 255, 0.45); transform: translate3d(0,0,0) scale3d(0.9, 0.9, 1); }
.ll-bgvocal {
  display: block; font-size: 16px; font-weight: 600; margin-left: 2px; max-height: 0; opacity: 0; margin-top: 0;
  color: rgba(255, 255, 255, 0.15); transform: translate3d(0,0,0) scale3d(0.85, 0.85, 1);
  will-change: transform, color, opacity, max-height, margin-top;
  transition: transform 700ms cubic-bezier(0.2, 0.9, 0.3, 1), color 700ms cubic-bezier(0.2, 0.9, 0.3, 1), max-height 400ms cubic-bezier(0.2, 0.9, 0.3, 1), margin-top 400ms cubic-bezier(0.2, 0.9, 0.3, 1), opacity 500ms ease;
}
.lyric-line.active .ll-bgvocal { max-height: 2em; opacity: 1; margin-top: 6px; color: rgba(255, 255, 255, 0.6); transform: translate3d(0,0,0) scale3d(1, 1, 1); }
.lyric-line.past .ll-bgvocal { max-height: 0; opacity: 0; margin-top: 0; color: rgba(255, 255, 255, 0.3); transform: translate3d(0,0,0) scale3d(0.9, 0.9, 1); }
.lyric-plain { padding: 6px 0; font-size: 20px; line-height: 1.65; color: rgba(236,231,222,0.65); word-wrap: break-word; font-weight: 600; }
.lyrics-status { padding: 32px 0; font-size: 14px; color: var(--muted); text-align: center; opacity: 0.55; }
#now-playing.lyrics-immersive { overflow: visible; z-index: 10; }

/* ═══════════════════ INFO SCREEN ═══════════════════ */
#info-screen {
  position: fixed; inset: 0; z-index: 300; display: flex; flex-direction: column;
  background: rgba(8,8,7,0.0); backdrop-filter: blur(0px) saturate(1); -webkit-backdrop-filter: blur(0px) saturate(1);
  pointer-events: none; transform: translate3d(0, 40px, 0); opacity: 0;
  transition: opacity 480ms cubic-bezier(0.16,1,0.3,1), transform 480ms cubic-bezier(0.16,1,0.3,1), backdrop-filter 480ms ease, background 480ms ease;
  will-change: transform, opacity; overflow: hidden;
}
#info-screen.open {
  opacity: 1; pointer-events: all; transform: translate3d(0, 0, 0);
  background: rgba(8,8,7,0.88); backdrop-filter: blur(40px) saturate(1.6); -webkit-backdrop-filter: blur(40px) saturate(1.6);
}
.info-header { padding: 24px 40px 20px; border-bottom: 1px solid rgba(255,255,255,0.07); flex-shrink: 0; display: flex; align-items: center; gap: 14px; }
.info-back-btn {
  background: var(--surf1); border: 1px solid var(--border); color: var(--muted); display: flex; align-items: center; justify-content: center;
  width: 34px; height: 34px; border-radius: 50%; cursor: pointer; transition: color var(--t-fast), background var(--t-fast), transform 180ms var(--spring-main); flex-shrink: 0; font-size: 16px;
}
.info-back-btn:hover { color: var(--text); background: var(--surf2); transform: scale(1.08); }
.info-header-art { width: 46px; height: 46px; border-radius: 10px; overflow: hidden; background: var(--surf2); flex-shrink: 0; box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
.info-header-art img { width: 100%; height: 100%; object-fit: cover; display: none; }
.info-header-text { min-width: 0; flex: 1; }
.info-header-song { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.info-header-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
.info-artist-tabs { display: flex; gap: 0; padding: 16px 40px 0; border-bottom: 1px solid rgba(255,255,255,0.07); flex-shrink: 0; overflow-x: auto; }
.info-artist-tabs::-webkit-scrollbar { display: none; }
.info-artist-tab {
  padding: 10px 18px 12px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; border: none; background: none; font-family: var(--sans);
  border-bottom: 2px solid transparent; white-space: nowrap; transition: color var(--t-fast), border-color var(--t-fast); margin-bottom: -1px;
}
.info-artist-tab:hover { color: var(--text); }
.info-artist-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.info-content { flex: 1; overflow-y: auto; padding: 32px 40px 48px; }
.info-content::-webkit-scrollbar { width: 2px; }
.info-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
.info-section { margin-bottom: 40px; opacity: 0; transform: translateY(12px); transition: opacity 360ms cubic-bezier(0.16,1,0.3,1), transform 360ms cubic-bezier(0.16,1,0.3,1); }
.info-section.visible { opacity: 1; transform: translateY(0); }
.info-section-label { font-size: 9.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted2); font-weight: 500; margin-bottom: 14px; }
.info-section-title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); margin-bottom: 10px; line-height: 1.25; }
.info-meta-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
.info-chip { background: var(--surf1); border: 1px solid var(--border); border-radius: 99px; padding: 5px 12px; font-size: 11.5px; color: var(--muted); }
.info-chip strong { color: var(--text); font-weight: 600; }
.info-body { font-size: 14px; line-height: 1.75; color: rgba(236,231,222,0.72); font-weight: 400; max-width: 680px; }
.info-body p + p { margin-top: 14px; }
.info-loading { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 12.5px; padding: 8px 0; }
.info-spinner { width: 16px; height: 16px; border: 2px solid var(--surf2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ═══════════════════ TOAST ═══════════════════ */
#toast {
  position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: var(--surf1); border: 1px solid var(--border); backdrop-filter: blur(24px);
  padding: 9px 18px; border-radius: 99px; font-size: 12px; color: var(--text); opacity: 0; transition: opacity 0.3s ease; pointer-events: none; z-index: 999; white-space: nowrap;
}
#toast.show { opacity: 1; }

/* ═══════════════════ RESPONSIVE — LARGE TABLET ═══════════════════ */
@media (max-width: 1280px) { #now-playing { width: 420px; } }
/* ═══════════════════ RESPONSIVE — TABLET ═══════════════════ */
@media (max-width: 1060px) { :root { --np-art-margin: 22px; } #sidebar { display: none; } #now-playing { width: 360px; } }
/* ═══════════════════ RESPONSIVE — SMALL TABLET ═══════════════════ */
@media (max-width: 860px) { :root { --np-art-margin: 18px; } #now-playing { width: 320px; } }

/* ═══════════════════ MOBILE LAYOUT ═══════════════════ */
@media (max-width: 680px) {
  :root { --np-art-margin: 30px; }
  .desktop-only { display: none; }
  #app { flex-direction: column; }
  #sidebar { display: none; }

  #now-playing {
    order: -1; width: 100% !important; flex-direction: column;
    height: auto; border-bottom: 1px solid var(--border); overflow: hidden; position: relative;
  }
  .np-stage { padding-top: 60px; align-items: center; justify-content: flex-start; flex: 0 0 auto; }

  .art-wrap { width: calc(100% - calc(var(--np-art-margin) * 2)); margin: 0 var(--np-art-margin); max-width: none; align-self: center; }
  .np-info { margin-top: 14px; width: calc(100% - calc(var(--np-art-margin) * 2)); max-width: none; text-align: left; padding: 0; align-self: center; }

  .np-controls { padding: 0 var(--np-art-margin) 18px; }
  .ctrl-row { padding: 0; }

  .library-header { position: relative; padding-right: 140px; }
  #drop-zone { position: absolute; top: 22px; right: 24px; margin: 0; padding: 6px 12px; width: auto; display: flex; align-items: center; gap: 6px; background: rgba(var(--c1), 0.05); border-color: rgba(var(--c1), 0.2); }
  #drop-zone .drop-icon { font-size: 14px; margin: 0; display: block; }
  #drop-zone .drop-text { font-size: 11px; margin: 0; }
  #library { flex: 1; border-right: none; }

  .info-header { padding: 20px 24px 16px; }
  .info-artist-tabs { padding: 0 24px; }
  .info-artist-tab { padding: 10px 14px 12px; font-size: 12px; }
  .info-content { padding: 24px 24px 48px; }
  .info-body { font-size: 13.5px; }

  #library-toggle-btn { display: none; }
  #library-collapse-btn { display: none; }
  #library.collapsed { flex: 1 !important; width: auto !important; opacity: 1 !important; border-right-color: transparent !important; pointer-events: all !important; }

  #lyrics-overlay { position: fixed !important; top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important; z-index: 100 !important; height: 100vh !important; }
  #lyrics-expand-btn { display: none !important; }
}

</head>
<body>

<div id="bg">
  <div id="bg-breathe">
    <div id="bg-layer-a" class="bg-drifting"></div>
    <div id="bg-layer-b"></div>
  </div>
</div>

<div id="app">
  <nav id="sidebar">
    <div class="logo">Aether<span class="logo-sub">Local Music</span></div>
    <button class="nav-btn active" onclick="setNav(this)"><i class="fas fa-layer-group"></i> Library</button>
    <button class="nav-btn" onclick="setNav(this)"><i class="fas fa-clock-rotate-left"></i> Recently Played</button>
    <button class="nav-btn" onclick="setNav(this)"><i class="fas fa-heart"></i> Favourites</button>
    <div class="sidebar-label">Playlists</div>
    <button class="nav-btn"><i class="fas fa-plus"></i> New Playlist</button>
  </nav>

  <main id="library">
    <div class="library-header">
      <div>
        <h1 class="library-title">Your Library</h1>
        <p class="track-count" id="track-count">0 tracks</p>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button id="library-collapse-btn" title="Minimize library" onclick="toggleLibrary()"><i class="fas fa-compress"></i></button>
        <div id="drop-zone" onclick="document.getElementById('file-input').click()">
          <div class="drop-icon"><i class="fas fa-cloud-arrow-up"></i></div>
          <p class="drop-text"><strong>Drop audio files here</strong><span class="desktop-only"><br>or click to browse · mp3, flac, aac, m4a, wav, ogg</span></p>
          <input type="file" id="file-input" multiple accept="audio/*"/>
        </div>
      </div>
    </div>
    <div id="track-list">
      <div class="empty-state" id="empty-state">
        <div class="big-icon"><i class="fas fa-music"></i></div>
        <p>Add some music to get started. Everything stays on your device.</p>
      </div>
    </div>
  </main>

  <section id="now-playing">
    <button id="library-toggle-btn" title="Show library" onclick="toggleLibrary()">
      <i class="fas fa-expand"></i><span class="lib-btn-label">Library</span>
    </button>

    <div class="np-stage" id="np-stage">
      <div class="art-wrap" id="art-wrap">
        <div class="art-placeholder" id="np-placeholder"><i class="fas fa-music"></i></div>
        <img id="np-cover" alt="Album Art"/>
      </div>
      <div class="np-info">
        <div class="np-title-wrap"><div id="np-title">Not playing</div></div>
        <div class="np-artist-wrap"><div id="np-artist" onclick="openInfoScreen()">—</div></div>
      </div>
    </div>

    <div class="np-controls">
      <div class="progress-wrap">
        <input type="range" id="progress-bar" min="0" max="100" value="0" step="0.1"/>
        <div class="time-row"><span id="time-current">0:00</span><span id="time-total">0:00</span></div>
      </div>
      <div class="ctrl-row">
        <button class="ctrl-btn" id="btn-shuffle" onclick="toggleShuffle()"><i class="fas fa-shuffle"></i></button>
        <button class="ctrl-btn" onclick="prevTrack()"><i class="fas fa-backward-step"></i></button>
        <button class="ctrl-btn play-btn" id="btn-play" onclick="togglePlay()">
          <i id="icon-play" class="fas fa-play"></i><i id="icon-pause" class="fas fa-pause" style="display:none"></i>
        </button>
        <button class="ctrl-btn" onclick="nextTrack()"><i class="fas fa-forward-step"></i></button>
        <button class="ctrl-btn" id="btn-repeat" onclick="cycleRepeat()">
          <i id="icon-rep-all" class="fas fa-repeat"></i>
          <span id="icon-rep-one" style="display: none; position: relative;"><i class="fas fa-repeat"></i><span style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 9px; font-weight: 800;">1</span></span>
        </button>
      </div>
      <div class="secondary-row">
        <div class="action-icons">
          <button class="icon-btn" id="lyrics-toggle-btn" title="Lyrics" onclick="toggleLyrics()"><i class="fa-regular fa-file-lines" style="pointer-events: none;"></i></button>
          <button class="icon-btn" title="Artist Info" onclick="openInfoScreen()"><i class="fa-regular fa-circle-question" style="pointer-events: none;"></i></button>
        </div>
      </div>
    </div>

    <div id="lyrics-overlay">
      <div class="lyrics-header">
        <div class="lyrics-header-left">
          <span class="lyrics-title">Lyrics</span>
          <div class="lyrics-track-pill">
            <div class="lyrics-track-pill-art"><img id="lyrics-pill-img" alt="" style="display:none"/></div>
            <div class="lyrics-track-pill-text">
              <div class="lyrics-track-pill-name" id="lyrics-pill-name">—</div>
              <div class="lyrics-track-pill-artist" id="lyrics-pill-artist">—</div>
            </div>
          </div>
        </div>
        <div class="lyrics-header-actions">
          <button class="lhdr-btn" id="lyrics-expand-btn" title="Expand lyrics" onclick="toggleImmersive()">
            <i class="fas fa-expand"></i>
          </button>
          <button class="lhdr-btn" title="Close lyrics" onclick="closeLyrics()">
            <i class="fas fa-xmark"></i>
          </button>
        </div>
      </div>
      <div id="lyrics-scroll-wrap">
        <div id="lyrics-inner"><div id="lyrics-panel"></div></div>
      </div>
    </div>
  </section>
</div>

<div id="info-screen">
  <div class="info-header">
    <button class="info-back-btn" onclick="closeInfoScreen()"><i class="fas fa-chevron-down"></i></button>
    <div class="info-header-art" id="info-header-art"><img id="info-header-img" alt=""/></div>
    <div class="info-header-text">
      <div class="info-header-song" id="info-header-song">—</div>
      <div class="info-header-meta" id="info-header-meta">—</div>
    </div>
  </div>
  <div class="info-artist-tabs" id="info-artist-tabs"></div>
  <div class="info-content" id="info-content">
    <div class="info-loading"><div class="info-spinner"></div> Loading information…</div>
  </div>
</div>

<div id="toast"></div>
<audio id="audio-el" preload="metadata"></audio>

<script>
'use strict';

const qs  = s => document.querySelector(s);
const qsa = s => document.querySelectorAll(s);
const uid = () => Math.random().toString(36).slice(2);
const fmt = s => { if (!s || isNaN(s)) return '0:00'; const m = Math.floor(s/60), sec = Math.floor(s%60); return `${m}:${sec.toString().padStart(2,'0')}`; };
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

/* ═══════════════ BACKGROUND ENGINE ═══════════════ */
const BG = { layerA: null, layerB: null, activeLayer: 'a', currentPalette: null, targetPalette: null, transitionRaf: null, defaultPalette: { r1:18, g1:14, b1:8, r2:10, g2:12, b2:18, r3:14, g3:10, b3:16 } };
function bgInit() { BG.layerA = qs('#bg-layer-a'); BG.layerB = qs('#bg-layer-b'); BG.currentPalette = { ...BG.defaultPalette }; applyGradientToLayer(BG.layerA, BG.currentPalette); BG.layerA.classList.add('bg-drifting'); }
function buildGradientCSS(p) { const {r1,g1,b1,r2,g2,b2,r3,g3,b3} = p; return `radial-gradient(ellipse 80% 60% at 20% 25%, rgba(${r1},${g1},${b1},0.85) 0%, rgba(${r1},${g1},${b1},0.3) 45%, transparent 70%), radial-gradient(ellipse 65% 75% at 78% 70%, rgba(${r2},${g2},${b2},0.75) 0%, rgba(${r2},${g2},${b2},0.25) 45%, transparent 70%), radial-gradient(ellipse 50% 50% at 55% 15%, rgba(${r3},${g3},${b3},0.55) 0%, transparent 65%), radial-gradient(ellipse 90% 90% at 50% 50%, rgba(${Math.round((r1+r2)/2)},${Math.round((g1+g2)/2)},${Math.round((b1+b2)/2)},0.12) 0%, transparent 75%), linear-gradient(160deg, rgba(${r1},${g1},${b1},0.5) 0%, rgba(${r2},${g2},${b2},0.3) 50%, rgba(${r3},${g3},${b3},0.4) 100%)`.trim(); }
function applyGradientToLayer(el, palette) { el.style.background = buildGradientCSS(palette); el.style.filter = 'blur(64px) saturate(1.15) brightness(0.75)'; }
function lerpPalette(from, to, t) { const lerp = (a,b) => Math.round(a + (b-a)*t); return { r1:lerp(from.r1,to.r1),g1:lerp(from.g1,to.g1),b1:lerp(from.b1,to.b1), r2:lerp(from.r2,to.r2),g2:lerp(from.g2,to.g2),b2:lerp(from.b2,to.b2), r3:lerp(from.r3,to.r3),g3:lerp(from.g3,to.g3),b3:lerp(from.b3,to.b3), }; }
function transitionBackground(newPalette) { if (BG.transitionRaf) cancelAnimationFrame(BG.transitionRaf); BG.targetPalette = { ...newPalette }; const fromPalette = { ...BG.currentPalette }; const incomingLayer = BG.activeLayer === 'a' ? BG.layerB : BG.layerA; const outgoingLayer = BG.activeLayer === 'a' ? BG.layerA : BG.layerB; applyGradientToLayer(incomingLayer, newPalette); incomingLayer.classList.add('bg-drifting'); const duration = 1800, start = performance.now(); function step(now) { const t = Math.min((now - start) / duration, 1); const e = t < 0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; incomingLayer.style.opacity = e; outgoingLayer.style.opacity = 1 - e; BG.currentPalette = lerpPalette(fromPalette, newPalette, e); if (t < 1) { BG.transitionRaf = requestAnimationFrame(step); } else { BG.activeLayer = BG.activeLayer === 'a' ? 'b' : 'a'; BG.currentPalette = { ...newPalette }; outgoingLayer.classList.remove('bg-drifting'); BG.transitionRaf = null; } } BG.transitionRaf = requestAnimationFrame(step); }
function extractPalette(src, callback) { const img = new Image(); img.crossOrigin = 'anonymous'; img.onload = () => { const regions = [ { x:0, y:0, w:0.4, h:0.4 }, { x:0.6, y:0.6, w:0.4, h:0.4 }, { x:0.3, y:0.0, w:0.4, h:0.3 }, ]; const colors = regions.map(region => { const c = document.createElement('canvas'); c.width = 16; c.height = 16; const ctx = c.getContext('2d'); ctx.drawImage(img, img.width*region.x, img.height*region.y, img.width*region.w, img.height*region.h, 0, 0, 16, 16); const d = ctx.getImageData(0,0,16,16).data; let r=0,g=0,b=0,n=0; for (let i=0;i<d.length;i+=4) { const lum = 0.299*d[i]+0.587*d[i+1]+0.114*d[i+2]; const max = Math.max(d[i],d[i+1],d[i+2]); const min = Math.min(d[i],d[i+1],d[i+2]); const sat = max>0?(max-min)/max:0; if (lum>20&&lum<210&&sat>0.1) { const w=sat*1.5+0.5; r+=d[i]*w; g+=d[i+1]*w; b+=d[i+2]*w; n+=w; } } if (!n) return null; r=Math.round(r/n); g=Math.round(g/n); b=Math.round(b/n); const grey=(r*0.299+g*0.587+b*0.114); const desat=0.82; r=Math.round(grey+(r-grey)*desat); g=Math.round(grey+(g-grey)*desat); b=Math.round(grey+(b-grey)*desat); r=Math.round(r*0.72); g=Math.round(g*0.72); b=Math.round(b*0.72); return {r,g,b}; }); const valid = colors.filter(Boolean); if (!valid.length) { callback(BG.defaultPalette); return; } while (valid.length < 3) valid.push(valid[valid.length-1]); callback({ r1:valid[0].r,g1:valid[0].g,b1:valid[0].b, r2:valid[1].r,g2:valid[1].g,b2:valid[1].b, r3:valid[2].r,g3:valid[2].g,b3:valid[2].b }); }; img.onerror = () => callback(BG.defaultPalette); img.src = src; }

/* ═══════════════ STATE ═══════════════ */
const S = { tracks: [], idx: -1, playing: false, shuffle: false, repeat: 'none', lyricsOpen: false, lyricsImmersive: false, lyricsData: [], lyricsMode: 'none', activeLineIdx: -1, autoScroll: true, scrollPauseTimer: null, scrollY: 0, scrollTarget: 0, isDragging: false, lineNodes: [], infoOpen: false, currentArtists: [], selectedArtistIdx: 0 };
const audio = qs('#audio-el');

/* ═══════════════ FILE INGESTION ═══════════════ */
function readMeta(file) { return new Promise(res => { const url = URL.createObjectURL(file); const name = file.name.replace(/\.[^.]+$/,''); const fb = { id:uid(),file,url,title:name,artist:'Unknown Artist',album:'',coverArt:null,duration:0 }; if (typeof jsmediatags==='undefined') { res(fb); return; } jsmediatags.read(file, { onSuccess(tag) { const t=tag.tags; let art=null; if (t.picture) { const {data,format}=t.picture; const bytes=new Uint8Array(data); let bin=''; bytes.forEach(b=>bin+=String.fromCharCode(b)); art=`data:${format};base64,${btoa(bin)}`; } res({ id:uid(),file,url,title:t.title||name,artist:t.artist||'Unknown Artist',album:t.album||'',coverArt:art,duration:0 }); }, onError() { res(fb); } }); }); }
async function addFiles(files) { const af=Array.from(files).filter(f=>f.type.startsWith('audio/')||/\.(mp3|flac|aac|m4a|wav|ogg|opus)$/i.test(f.name)); if (!af.length) { toast('No audio files found'); return; } toast(`Loading ${af.length} track${af.length>1?'s':''}…`); for (const f of af) { const track=await readMeta(f); await new Promise(r=>{const tmp=new Audio();tmp.src=track.url;tmp.onloadedmetadata=()=>{track.duration=tmp.duration;r();};tmp.onerror=r;}); S.tracks.push(track); renderTrackItem(track,S.tracks.length-1); } qs('#empty-state').style.display='none'; qs('#track-count').textContent=`${S.tracks.length} track${S.tracks.length!==1?'s':''}`; if (S.idx===-1) loadTrack(0); toast(`Added ${af.length} track${af.length>1?'s':''}`); }
const dz=qs('#drop-zone'),fi=qs('#file-input'); dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over');}); dz.addEventListener('dragleave', () => dz.classList.remove('drag-over')); dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');addFiles(e.dataTransfer.files);}); fi.addEventListener('change',e=>addFiles(e.target.files)); document.addEventListener('dragover',e=>e.preventDefault()); document.addEventListener('drop',e=>{e.preventDefault();if(e.dataTransfer.files.length)addFiles(e.dataTransfer.files);});

/* ═══════════════ TRACK LIST ═══════════════ */
function renderTrackItem(track,index) { const list=qs('#track-list'); const div=document.createElement('div'); div.className='track-item'; div.id=`ti-${track.id}`; div.style.animationDelay=`${Math.min(index*35,350)}ms`; div.onclick=()=>loadTrack(index); div.innerHTML=`<div class="track-thumb">${track.coverArt?`<img src="${track.coverArt}" alt=""/>`:`<span class="track-thumb-placeholder"><i class="fas fa-music"></i></span>`}</div><div class="track-info"><div class="track-name">${esc(track.title)}</div><div class="track-artist">${esc(track.artist)}</div></div><div class="track-meta"><div class="bars" id="bars-${track.id}" style="display:none"><span></span><span></span><span></span></div><div class="track-dur">${fmt(track.duration)}</div></div>`; list.appendChild(div); }
function highlightTrack() { qsa('.track-item').forEach(el=>el.classList.remove('playing')); qsa('.bars').forEach(el=>el.style.display='none'); if (S.idx>=0) { const t=S.tracks[S.idx]; const item=qs(`#ti-${t.id}`),bars=qs(`#bars-${t.id}`); if (item) item.classList.add('playing'); if (bars&&S.playing) bars.style.display='flex'; } }

/* ═══════════════ PLAYBACK ═══════════════ */
function updateMarquee() { const titleEl = qs('#np-title'); const artistEl = qs('#np-artist'); const titleWrap = titleEl.parentElement; const artistWrap = artistEl.parentElement; setTimeout(() => { titleEl.classList.remove('marquee'); titleEl.style.removeProperty('--marquee-offset'); if (titleEl.scrollWidth > titleWrap.clientWidth + 2) { const offset = -(titleEl.scrollWidth - titleWrap.clientWidth + 24); titleEl.style.setProperty('--marquee-offset', offset + 'px'); titleEl.classList.add('marquee'); } artistEl.classList.remove('marquee'); artistEl.style.removeProperty('--marquee-offset'); if (artistEl.scrollWidth > artistWrap.clientWidth + 2) { const offset = -(artistEl.scrollWidth - artistWrap.clientWidth + 24); artistEl.style.setProperty('--marquee-offset', offset + 'px'); artistEl.classList.add('marquee'); } }, 120); }
function loadTrack(idx) { if (idx<0||idx>=S.tracks.length) return; S.idx=idx; const t=S.tracks[idx]; audio.src=t.url; audio.load(); qs('#np-title').textContent=t.title; qs('#np-artist').textContent=t.artist; updateMarquee(); const cover=qs('#np-cover'),ph=qs('#np-placeholder'),wrap=qs('#art-wrap'); if (t.coverArt) { cover.src=t.coverArt; cover.classList.add('visible'); ph.style.display='none'; wrap.classList.add('glowing'); extractPalette(t.coverArt,palette=>{ transitionBackground(palette); const {r1,g1,b1}=palette; applyTheme(Math.min(255,Math.round(r1*1.55)),Math.min(255,Math.round(g1*1.55)),Math.min(255,Math.round(b1*1.55))); }); } else { cover.classList.remove('visible'); ph.style.display='flex'; wrap.classList.remove('glowing'); transitionBackground(BG.defaultPalette); resetTheme(); } updateLyricsPill(t); S.currentArtists = parseArtists(t.artist); S.selectedArtistIdx = 0; highlightTrack(); fetchLyrics(t); play(); }
function parseArtists(artistStr) { if (!artistStr || artistStr === 'Unknown Artist') return [artistStr || 'Unknown Artist']; const parts = artistStr.split(/\s*[\/&,]\s*|\s+feat\.\s+|\s+ft\.\s+|\s+x\s+/i).map(s => s.trim()).filter(Boolean); return parts.length ? parts : [artistStr]; }
function updateLyricsPill(t) { qs('#lyrics-pill-name').textContent=t.title; qs('#lyrics-pill-artist').textContent=t.artist; const img=qs('#lyrics-pill-img'); if (t.coverArt){img.src=t.coverArt;img.style.display='block';} else img.style.display='none'; }
function play() { audio.play().then(()=>{S.playing=true;updatePlayBtn();highlightTrack();}).catch(()=>{}); }
function togglePlay() { if (!S.tracks.length) return; if (S.playing){audio.pause();S.playing=false;}else{audio.play();S.playing=true;} updatePlayBtn(); highlightTrack(); }
function prevTrack() { if (!S.tracks.length) return; if (audio.currentTime>3){audio.currentTime=0;return;} loadTrack(((S.idx-1)+S.tracks.length)%S.tracks.length); }
function nextTrack() { if (!S.tracks.length) return; let i; if (S.shuffle){i=Math.floor(Math.random()*S.tracks.length);} else{ i=S.idx+1; if (i>=S.tracks.length){ if (S.repeat==='all') i=0; else{audio.pause();S.playing=false;updatePlayBtn();return;} } } loadTrack(i); }
function toggleShuffle(){S.shuffle=!S.shuffle;qs('#btn-shuffle').classList.toggle('active-btn',S.shuffle);toast(S.shuffle?'Shuffle on':'Shuffle off');}
function cycleRepeat(){const m=['none','all','one'];S.repeat=m[(m.indexOf(S.repeat)+1)%3];qs('#btn-repeat').classList.toggle('active-btn',S.repeat!=='none');qs('#icon-rep-one').style.display=S.repeat==='one'?'inline-block':'none';qs('#icon-rep-all').style.opacity=S.repeat==='one'?'0':'1';toast({none:'Repeat off',all:'Repeat all',one:'Repeat one'}[S.repeat]);}
function updatePlayBtn(){ qs('#icon-play').style.display=S.playing?'none':'block'; qs('#icon-pause').style.display=S.playing?'block':'none'; }

/* ═══════════════ AUDIO EVENTS ═══════════════ */
audio.addEventListener('ended',()=>{if(S.repeat==='one'){audio.currentTime=0;play();}else nextTrack();});
audio.addEventListener('timeupdate',()=>{
  const {currentTime,duration}=audio;
  if (!duration) return;
  const pct=(currentTime/duration)*100;
  const bar=qs('#progress-bar');
  bar.value=pct; bar.style.setProperty('--prog',pct+'%');
  qs('#time-current').textContent=fmt(currentTime);
  syncLyrics(currentTime);
});
audio.addEventListener('loadedmetadata',()=>{ qs('#time-total').textContent=fmt(audio.duration); });
qs('#progress-bar').addEventListener('input',function(){if(audio.duration)audio.currentTime=(this.value/100)*audio.duration;});

/* ═══════════════ LYRICS FETCH ═══════════════ */
async function fetchLyrics(track) { const panel=qs('#lyrics-panel'); panel.innerHTML='<div class="lyrics-status">Loading lyrics…</div>'; S.lyricsData=[];S.lyricsMode='none';S.activeLineIdx=-1;S.lineNodes=[]; S.scrollY=0;S.scrollTarget=0; if (!track.title||track.title==='Unknown Artist'){ panel.innerHTML=noLyricsMsg('No metadata');return; } try { const q=new URLSearchParams({track_name:track.title,artist_name:track.artist}); const res=await fetch(`https://lrclib.net/api/get?${q}`); if (!res.ok) throw new Error(); const data=await res.json(); if (data.syncedLyrics){ S.lyricsData=parseLrc(data.syncedLyrics); S.lyricsMode='line'; buildLyricsUI(); } else if (data.plainLyrics){ S.lyricsMode='plain'; const html=data.plainLyrics.split('\n').map(l=>`<div class="lyric-plain">${esc(l)||'&nbsp;'}</div>`).join(''); panel.innerHTML=html; } else throw new Error(); } catch { panel.innerHTML=noLyricsMsg('Lyrics not found'); } }
function parseLrc(lrc) { const lines=[]; const rx=/\[(\d+):(\d+\.\d+)\](.*)/; lrc.split('\n').forEach(line=>{ const m=line.match(rx);if(!m)return; const time=parseInt(m[1])*60+parseFloat(m[2]); let raw=m[3].trim();if(!raw)return; lines.push({time,text:raw}); }); return lines.sort((a,b)=>a.time-b.time); }
function processBracketedText(raw) { const purelyBracketed = /^[\(\[](.*?)[\)\]]$/.test(raw.trim()); const bracketFragments = []; const bracketRx = /[\(\[](.*?)[\)\]]/g; let bm; while ((bm = bracketRx.exec(raw)) !== null) { bracketFragments.push(bm[1]); } const mainText = raw.replace(/\s*[\(\[](.*?)[\)\]]/g,'').trim(); const bgText = bracketFragments.length > 0 ? bracketFragments.join(', ') : null; return { mainText: mainText || raw, bgText, purelyBracketed, hasBrackets: bracketFragments.length > 0 }; }

let isDragMoved = false;
function buildLyricsUI() { const panel=qs('#lyrics-panel'); panel.innerHTML=''; S.lineNodes=[]; S.lyricsData.forEach((line,li)=>{ const row=document.createElement('div'); row.className='lyric-line'; row.dataset.idx=li; row.addEventListener('click', () => { if (isDragMoved) return; seekToLine(li); }); const {mainText,bgText,purelyBracketed}=processBracketedText(line.text); const textEl=document.createElement('span'); textEl.className='ll-text'; textEl.textContent=purelyBracketed ? bgText || mainText : mainText; row.appendChild(textEl); let bgVocalEl=null; if (!purelyBracketed && bgText) { bgVocalEl=document.createElement('span'); bgVocalEl.className='ll-bgvocal'; bgVocalEl.textContent=bgText; row.appendChild(bgVocalEl); } S.lineNodes.push({el:row, time:line.time}); panel.appendChild(row); }); }
function syncLyrics(t) { if (!S.lyricsData.length||S.lyricsMode==='plain') return; let active=-1; for(let i=0;i<S.lyricsData.length;i++){ if(S.lyricsData[i].time<=t+0.2) active=i; else break; } if (active===S.activeLineIdx) return; S.activeLineIdx=active; if (S.lineNodes.length) { for(let i=0;i<S.lineNodes.length;i++){ const node = S.lineNodes[i]; const d = i - active; node.el.classList.toggle('active', d === 0); node.el.classList.toggle('past', d < 0); } } }

/* ═══════════════ SCROLL LOOP ═══════════════ */
let scrollLoopActive = false; const ANCHOR_OFFSET = 90;
function startScrollLoop() { if (scrollLoopActive) return; scrollLoopActive = true; function loop() { if (!S.lyricsOpen) { scrollLoopActive = false; return; } if (S.autoScroll && !S.isDragging && S.activeLineIdx >= 0) { const node = S.lineNodes[S.activeLineIdx]; if (node) S.scrollTarget = node.el.offsetTop - ANCHOR_OFFSET; } const maxScroll = Math.max(0, qs('#lyrics-inner').scrollHeight - qs('#lyrics-scroll-wrap').clientHeight); S.scrollTarget = Math.max(0, Math.min(S.scrollTarget, maxScroll)); if (S.isDragging) { S.scrollY = S.scrollTarget; } else { S.scrollY += (S.scrollTarget - S.scrollY) * 0.15; } qs('#lyrics-inner').style.transform = `translate3d(0, ${-S.scrollY}px, 0)`; requestAnimationFrame(loop); } requestAnimationFrame(loop); }

const lswEl=qs('#lyrics-scroll-wrap');
lswEl.addEventListener('wheel', e => { e.preventDefault(); pauseAutoScroll(); S.scrollTarget += e.deltaY; const maxScroll = Math.max(0, qs('#lyrics-inner').scrollHeight - lswEl.clientHeight); S.scrollTarget = Math.max(0, Math.min(S.scrollTarget, maxScroll)); S.scrollY = S.scrollTarget; }, {passive: false});
let dragStartY = null; let dragStartScroll = 0;
lswEl.addEventListener('pointerdown', e => { if (e.pointerType === 'mouse' && e.button !== 0) return; dragStartY = e.clientY; dragStartScroll = S.scrollY; S.isDragging = true; isDragMoved = false; pauseAutoScroll(); lswEl.setPointerCapture(e.pointerId); });
lswEl.addEventListener('pointermove', e => { if (!S.isDragging || dragStartY === null) return; const dy = dragStartY - e.clientY; if (Math.abs(dy) > 5) isDragMoved = true; if (!isDragMoved) return; e.preventDefault(); pauseAutoScroll(); S.scrollTarget = dragStartScroll + dy; const maxScroll = Math.max(0, qs('#lyrics-inner').scrollHeight - lswEl.clientHeight); S.scrollTarget = Math.max(0, Math.min(S.scrollTarget, maxScroll)); S.scrollY = S.scrollTarget; });
lswEl.addEventListener('pointerup', () => { dragStartY = null; S.isDragging = false; }); lswEl.addEventListener('pointercancel', () => { dragStartY = null; S.isDragging = false; });
function pauseAutoScroll() { S.autoScroll = false; clearTimeout(S.scrollPauseTimer); S.scrollPauseTimer = setTimeout(() => { S.autoScroll = true; }, 2000); }
function seekToLine(li){ if(!S.lyricsData[li])return; audio.currentTime = S.lyricsData[li].time; S.autoScroll = true; if(!S.playing) play(); }

/* ═══════════════ LYRICS STATE ═══════════════ */
function toggleLyrics(){if(S.lyricsOpen)closeLyrics();else openLyrics();}
function openLyrics(){ S.lyricsOpen=true; S.lyricsImmersive=false; applyLyricsState(); if (S.activeLineIdx >= 0 && S.lineNodes[S.activeLineIdx]) { S.scrollTarget = S.lineNodes[S.activeLineIdx].el.offsetTop - ANCHOR_OFFSET; S.scrollY = S.scrollTarget; } startScrollLoop(); }
function closeLyrics(){ S.lyricsOpen=false;S.lyricsImmersive=false;applyLyricsState(); }
function toggleImmersive(){ if(!S.lyricsOpen)return; S.lyricsImmersive=!S.lyricsImmersive;applyLyricsState(); }
function applyLyricsState(){ const np=qs('#now-playing'); np.classList.toggle('lyrics-open',S.lyricsOpen); np.classList.toggle('lyrics-immersive',S.lyricsOpen&&S.lyricsImmersive); const overlay=qs('#lyrics-overlay'); if(S.lyricsOpen&&S.lyricsImmersive){ if (window.innerWidth <= 680) { const npRect = np.getBoundingClientRect(); const appRect = qs('#app').getBoundingClientRect(); const extraH = appRect.bottom - npRect.bottom; overlay.style.height = `calc(100% + ${extraH}px)`; overlay.style.width = '100%'; overlay.style.left = '0'; overlay.style.right = '0'; } else { const npRect=np.getBoundingClientRect(); const libRect=qs('#library').getBoundingClientRect(); const extraW=npRect.left-libRect.left; overlay.style.width=`calc(100% + ${extraW}px)`; overlay.style.left=`-${extraW}px`; overlay.style.right='0'; overlay.style.height=''; } } else { overlay.style.width='';overlay.style.left='';overlay.style.right='';overlay.style.height=''; } qs('#lyrics-toggle-btn').classList.toggle('active-btn',S.lyricsOpen); updateExpandIcon(); }
function updateExpandIcon(){ const btn=qs('#lyrics-expand-btn'); if(S.lyricsImmersive){ btn.innerHTML=`<i class="fas fa-compress"></i>`; btn.title='Collapse lyrics'; } else { btn.innerHTML=`<i class="fas fa-expand"></i>`; btn.title='Expand lyrics'; } }
function noLyricsMsg(msg){return `<div class="lyrics-status">${esc(msg)}</div>`;}

/* ═══════════════ THEMING ═══════════════ */
function applyTheme(r,g,b){ const root=document.documentElement; root.style.setProperty('--c1',`${r},${g},${b}`); root.style.setProperty('--accent',`rgb(${r},${g},${b})`); root.style.setProperty('--accent-dim',`rgba(${r},${g},${b},0.55)`); root.style.setProperty('--accent-glow',`rgba(${r},${g},${b},0.18)`); root.style.setProperty('--accent-hair',`rgba(${r},${g},${b},0.08)`); }
function resetTheme(){ const root=document.documentElement; root.style.setProperty('--c1','200,169,110'); root.style.setProperty('--accent','rgb(200,169,110)'); root.style.setProperty('--accent-dim','rgba(200,169,110,0.55)'); root.style.setProperty('--accent-glow','rgba(200,169,110,0.18)'); root.style.setProperty('--accent-hair','rgba(200,169,110,0.08)'); }

/* ═══════════════ INFO SCREEN ═══════════════ */
function openInfoScreen() { if (!S.tracks.length || S.idx < 0) return; const t = S.tracks[S.idx]; if (!t || t.artist === 'Unknown Artist') return; S.infoOpen = true; const screen = qs('#info-screen'); screen.classList.add('open'); const headerImg = qs('#info-header-img'); if (t.coverArt) { headerImg.src = t.coverArt; headerImg.style.display = 'block'; } else headerImg.style.display = 'none'; qs('#info-header-song').textContent = t.title; qs('#info-header-meta').textContent = t.album ? `${t.album}` : t.artist; S.currentArtists = parseArtists(t.artist); S.selectedArtistIdx = 0; buildArtistTabs(); loadInfoContent(t); }
function closeInfoScreen() { S.infoOpen = false; qs('#info-screen').classList.remove('open'); }
function buildArtistTabs() { const tabsEl = qs('#info-artist-tabs'); tabsEl.innerHTML = ''; S.currentArtists.forEach((artist, i) => { const btn = document.createElement('button'); btn.className = 'info-artist-tab' + (i === 0 ? ' active' : ''); btn.textContent = artist; btn.onclick = () => { S.selectedArtistIdx = i; qsa('.info-artist-tab').forEach((b, bi) => b.classList.toggle('active', bi === i)); if (S.idx >= 0) loadInfoContent(S.tracks[S.idx]); }; tabsEl.appendChild(btn); }); }
async function loadInfoContent(track) { const content = qs('#info-content'); content.innerHTML = '<div class="info-loading"><div class="info-spinner"></div> Loading information…</div>'; const selectedArtist = S.currentArtists[S.selectedArtistIdx] || track.artist; try { const response = await fetch('https://api.anthropic.com/v1/messages', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, tools: [{ type: 'web_search_20250305', name: 'web_search' }], messages: [{ role: 'user', content: `You are a music information assistant. For the song "${track.title}" by "${track.artist}", and specifically focusing on the artist "${selectedArtist}", provide a JSON response with the following structure. Use web search to find accurate information. Return ONLY valid JSON, no markdown, no extra text: { "song": { "description": "2-3 sentence description of the song's meaning, context, or reception", "album": "album name or null", "releaseYear": "year as string or null", "genre": "primary genre or null" }, "artist": { "name": "${selectedArtist}", "bio": "3-4 sentence biography covering origin, musical style, and significance", "origin": "city/country or null", "activeYears": "e.g. 2010–present or null", "notableWorks": ["work1", "work2", "work3"] } }` }] }) }); const data = await response.json(); let text = ''; if (data.content) { for (const block of data.content) { if (block.type === 'text') text += block.text; } } const clean = text.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim(); let info; try { info = JSON.parse(clean); } catch { const jsonMatch = clean.match(/\{[\s\S]*\}/); if (jsonMatch) info = JSON.parse(jsonMatch[0]); else throw new Error('No JSON'); } renderInfoContent(info, selectedArtist); } catch (err) { content.innerHTML = ` <div class="info-section visible"> <div class="info-section-label">About Artist</div> <div class="info-section-title">${esc(selectedArtist)}</div> <div class="info-body"><p>Information about ${esc(selectedArtist)} could not be loaded. Please check your connection.</p></div> </div> `; } }
function renderInfoContent(info, selectedArtist) { const content = qs('#info-content'); const song = info.song || {}; const artist = info.artist || {}; const chips = []; if (song.album) chips.push(`<span class="info-chip"><strong>Album</strong> ${esc(song.album)}</span>`); if (song.releaseYear) chips.push(`<span class="info-chip"><strong>Year</strong> ${esc(song.releaseYear)}</span>`); if (song.genre) chips.push(`<span class="info-chip"><strong>Genre</strong> ${esc(song.genre)}</span>`); const t = S.idx >= 0 ? S.tracks[S.idx] : null; const notableWorks = Array.isArray(artist.notableWorks) && artist.notableWorks.length ? `<div style="margin-top:14px;"><div style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted2);margin-bottom:10px;">Notable Works</div> <div style="display:flex;flex-wrap:wrap;gap:8px;">${artist.notableWorks.map(w=>`<span class="info-chip">${esc(w)}</span>`).join('')}</div></div>` : ''; const artistMeta = []; if (artist.origin) artistMeta.push(`<span class="info-chip"><strong>Origin</strong> ${esc(artist.origin)}</span>`); if (artist.activeYears) artistMeta.push(`<span class="info-chip"><strong>Active</strong> ${esc(artist.activeYears)}</span>`); content.innerHTML = ` <div class="info-section" id="is-song"> <div class="info-section-label">About Song</div> <div class="info-section-title">${esc(t ? t.title : 'Unknown')}</div> ${chips.length ? `<div class="info-meta-chips">${chips.join('')}</div>` : ''} <div class="info-body"><p>${esc(song.description || 'No description available.')}</p></div> </div> <div class="info-section" id="is-artist" style="transition-delay:80ms"> <div class="info-section-label">About Artist</div> <div class="info-section-title">${esc(artist.name || selectedArtist)}</div> ${artistMeta.length ? `<div class="info-meta-chips">${artistMeta.join('')}</div>` : ''} <div class="info-body"><p>${esc(artist.bio || 'No biography available.')}</p></div> ${notableWorks} </div> `; requestAnimationFrame(() => { qsa('.info-section').forEach((el, i) => { setTimeout(() => el.classList.add('visible'), i * 60); }); }); }

/* ═══════════════ KEYBOARD & RESIZE ═══════════════ */
document.addEventListener('keydown',e=>{ if(e.target.tagName==='INPUT')return; if(e.code==='Space'){e.preventDefault();togglePlay();} if(e.code==='ArrowRight') audio.currentTime=Math.min(audio.duration||0,audio.currentTime+5); if(e.code==='ArrowLeft') audio.currentTime=Math.max(0,audio.currentTime-5); if(e.code==='KeyL') toggleLyrics(); if(e.code==='Escape'){if(S.infoOpen)closeInfoScreen();else if(S.lyricsOpen)closeLyrics();} });
window.addEventListener('resize', () => { if (S.lyricsOpen) applyLyricsState(); });

/* ═══════════════ TOAST ═══════════════ */
let _tt; function toast(msg){const t=qs('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2200);}
function setNav(el){qsa('.nav-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');}

/* ═══════════════ LIBRARY TOGGLE ═══════════════ */
function toggleLibrary() { const app = qs('#app'); const lib = qs('#library'); const btn = qs('#library-toggle-btn'); const isCollapsed = lib.classList.contains('collapsed'); if (isCollapsed) { lib.classList.remove('collapsed'); app.classList.remove('library-collapsed'); btn.style.opacity = '0'; btn.style.pointerEvents = 'none'; } else { lib.classList.add('collapsed'); app.classList.add('library-collapsed'); btn.style.opacity = '1'; btn.style.pointerEvents = 'all'; } }

/* ═══════════════ INIT ═══════════════ */
bgInit();
</script>
